name: Bug 报告
description: 报告一个 Bug 以帮助我们改进
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰描述你遇到的问题
      placeholder: 例如：调用 /api/clip 接口时返回 500 错误
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 提供复现该问题的步骤
      placeholder: |
        1. 启动服务
        2. 发送 POST /api/clip 请求
        3. 查看返回结果
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确行为是什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志输出
      description: 粘贴相关的错误日志（请移除敏感信息）
      render: shell

  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: 列出你的运行环境
      placeholder: |
        - Node.js 版本：
        - 操作系统：
        - Docker 版本（如适用）：
        - obclipper-server 版本：
    validations:
      required: true
